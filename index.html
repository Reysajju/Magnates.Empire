          "text": "Apply perfume to clean, moisturized skin. The oils in moisturizer help lock in the fragrance. Use an unscented lotion to avoid competing scents.",

        },
        {
          "@type": "HowToStep",
          "position": 2,
          "name": "Target Pulse Points",
          "text": "Apply to pulse points where blood vessels are close to the skin: wrists, neck, behind ears, inner elbows, and behind knees. These warm areas help diffuse the fragrance.",
          "image": "https://magnatesempire.com/step2-pulse.jpg"
        },
        {
          "@type": "HowToStep",
          "position": 3,
          "name": "Spray from Distance",
          "text": "Hold the bottle 6-8 inches (15-20 cm) away from your skin. This creates a fine mist that distributes evenly rather than concentrating in one spot.",
          "image": "https://magnatesempire.com/step3-spray.jpg"
        },
        {
          "@type": "HowToStep",
          "position": 4,
          "name": "Don't Rub",
          "text": "Allow the perfume to dry naturally. Avoid rubbing your wrists together as this breaks down the fragrance molecules and alters the scent composition.",

        },
        {
          "@type": "HowToStep",
          "position": 5,
          "name": "Layer for Longevity",
          "text": "For all-day wear, spray lightly on clothing and hair. The fibers hold scent longer than skin. Store your perfume in a cool, dark place to preserve its integrity.",

        }
      ],
